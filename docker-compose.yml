services:
  blog:
    build: .
    ports:
      - "8080:8080"
      - "9101:9101"
    volumes:
      - blog-uploads:/app/uploads
      - blog-data:/app/data
    environment:
      - JWT_SECRET=your-random-secret-here
      - EXPORTER_METRICS_URL=http://127.0.0.1:9101/metrics
      - POETRY_API_URL=http://poetry:1279/api/poems/random?lang=zh-Hans
    depends_on:
      - poetry
    restart: unless-stopped

  poetry:
    image: palemoky/chinese-poetry-api:latest
    expose:
      - "1279"
    restart: unless-stopped

volumes:
  blog-uploads:
  blog-data:
